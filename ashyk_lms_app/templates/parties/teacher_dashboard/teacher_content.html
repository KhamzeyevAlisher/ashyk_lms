<!-- Секция тақырыбы -->
<div class="container_content">
    <div class="section-header-content">
        <div>
            <h1 class="title_content">Менің курстарым</h1>
            <p class="subtitle_content">Курстарыңызды басқарыңыз және жаңа материалдар қосыңыз</p>
        </div>
        <button class="btn_add_content" onclick="openAddCourseModal()">
            <i class="fa-solid fa-plus" style="margin-right: 8px;"></i> Курс қосу
        </button>
    </div>

    <!-- Фильтрация және Батырма панелі -->
    <div class="filters-container-content">
        <div class="search-box-content">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="myCourseSearch" placeholder="Курсты іздеу...">
        </div>

        <div class="filters-controls-content">
            <!-- 1. Санат селекті -->
            <div class="custom-select-content" id="myCategorySelect">
                <div class="select-trigger-content">
                    <span>Барлық санаттар</span>
                    <i class="fa-solid fa-chevron-down"></i>
                </div>
                <div class="select-options-content">
                    <div class="option-content selected" data-value="all">Барлық санаттар</div>
                    <div class="option-content" data-value="programming">Бағдарламалау</div>
                    <div class="option-content" data-value="business">Бизнес</div>
                    <div class="option-content" data-value="design">Дизайн</div>
                </div>
            </div>

            <!-- 2. Статус селекті -->
            <div class="custom-select-content" id="myStatusSelect">
                <div class="select-trigger-content">
                    <span>Статус</span>
                    <i class="fa-solid fa-chevron-down"></i>
                </div>
                <div class="select-options-content">
                    <div class="option-content selected" data-value="all">Статус</div>
                    <div class="option-content" data-value="active">Белсенді</div>
                    <div class="option-content" data-value="completed">Аяқталған</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Курстар торы (Grid) -->
    <div id="my-courses-grid" class="courses-grid-content">
        <!-- JS арқылы толтырылады -->
    </div>
</div>

<!-- Курсты басқару панелі (Course Management) -->
<div id="course-manage-panel" class="container_content hidden">
    <div class="manage-header">
        <button onclick="closeCourseManagement()" class="back-btn-content">
            <i class="fa-solid fa-arrow-left"></i> Артқа
        </button>
        <h2 id="manage-course-title" class="title_content" style="margin: 0;">Курс атауы</h2>
    </div>

    <div class="manage-content-grid">
        <!-- Лекциялар бөлімі -->
        <div class="manage-section-content">
            <div class="manage-section-header">
                <h3 class="section_title_content">Дәрістер</h3>
                <button class="btn_add_small_content" onclick="openAddLectureModal()">
                    <i class="fa-solid fa-plus"></i> Қосу
                </button>
            </div>
            <div id="manage-lectures-list" class="lecture-stack-content">
                <!-- JS арқылы толтырылады -->
            </div>
        </div>
    </div>
</div>
